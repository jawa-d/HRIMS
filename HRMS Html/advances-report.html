<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRMS | Advances Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../HRMS%20CSS/tokens.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/global.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/components.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/navbar.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/sidebar.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/toast.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/advances-report.css" />
</head>
<body data-page="advances_report">
  <div id="app" class="app-shell">
    <div id="sidebar-root"></div>
    <div class="main-content">
      <div id="navbar-root"></div>
      <main class="page">
        <div class="page-header">
          <div>
            <h1 class="page-title" data-i18n="advances_report.title">Advances Report</h1>
            <p class="text-muted" data-i18n="advances_report.subtitle">Track advance workflow, aging, and overdue alerts with employee-level view.</p>
          </div>
          <div class="adv-report-actions">
            <button class="btn btn-ghost" id="adv-export-excel-btn" data-i18n="advances_report.export_excel">Export Excel</button>
            <button class="btn btn-ghost" id="adv-export-pdf-btn" data-i18n="advances_report.export_pdf">Export PDF</button>
          </div>
        </div>

        <section class="adv-report-filters">
          <input class="input" id="adv-search" type="search" data-i18n-placeholder="advances_report.filter.search" placeholder="Search employee, reference, department..." />
          <select class="select" id="adv-stage-filter">
            <option value="" data-i18n="common.all">All</option>
            <option value="requested" data-i18n="accounting.workflow.requested">Requested</option>
            <option value="approved" data-i18n="accounting.workflow.approved">Approved</option>
            <option value="disbursed" data-i18n="accounting.workflow.disbursed">Disbursed</option>
            <option value="closed" data-i18n="accounting.workflow.closed">Closed</option>
            <option value="rejected" data-i18n="accounting.workflow.rejected">Rejected</option>
          </select>
          <input class="input" id="adv-month-filter" type="month" />
        </section>

        <section class="adv-kpi grid-4">
          <div class="card summary-card">
            <div class="text-muted" data-i18n="advances_report.kpi.total_open">Open Advances Total</div>
            <div class="summary-value" id="adv-kpi-open-total">0</div>
          </div>
          <div class="card summary-card">
            <div class="text-muted" data-i18n="advances_report.kpi.count_open">Open Advances Count</div>
            <div class="summary-value" id="adv-kpi-open-count">0</div>
          </div>
          <div class="card summary-card">
            <div class="text-muted" data-i18n="advances_report.kpi.overdue_count">Overdue Count</div>
            <div class="summary-value" id="adv-kpi-overdue-count">0</div>
          </div>
          <div class="card summary-card">
            <div class="text-muted" data-i18n="advances_report.kpi.closure_rate">Closure Rate</div>
            <div class="summary-value" id="adv-kpi-closure-rate">0%</div>
          </div>
        </section>

        <section class="card">
          <div class="table-scroll">
            <table class="table">
              <thead>
                <tr>
                  <th data-i18n="accounting.employee">Employee</th>
                  <th data-i18n="accounting.employee_id">Employee ID</th>
                  <th data-i18n="accounting.department">Department</th>
                  <th data-i18n="common.status">Status</th>
                  <th data-i18n="accounting.due_date">Due Date</th>
                  <th data-i18n="accounting.age_days">Age (Days)</th>
                  <th data-i18n="accounting.overdue">Overdue</th>
                  <th data-i18n="common.amount">Amount</th>
                  <th data-i18n="common.details">Details</th>
                </tr>
              </thead>
              <tbody id="adv-report-body"></tbody>
            </table>
          </div>
          <div id="adv-report-empty" class="empty-state hidden" data-i18n="advances_report.empty">No advances found for selected filters.</div>
        </section>
      </main>
    </div>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script type="module" src="../Page%20Controllers/advances-report.page.js"></script>
</body>
</html>
