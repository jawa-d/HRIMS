<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRMS | Announcements</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../HRMS%20CSS/tokens.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/global.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/components.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/navbar.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/sidebar.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/modal.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/toast.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/announcements.css" />
</head>
<body data-page="announcements">
  <div id="app" class="app-shell">
    <div id="sidebar-root"></div>
    <div class="main-content">
      <div id="navbar-root"></div>
      <main class="page">
        <div class="page-header">
          <div>
            <h1 class="page-title" data-i18n="announcements.title">Announcements</h1>
            <p class="text-muted">Broadcast company updates, policy changes, and urgent notices with clear targeting.</p>
          </div>
          <button class="btn btn-primary" id="announcements-add-btn">
            <i data-lucide="plus"></i>
            New Announcement
          </button>
        </div>

        <section class="ann-filters card">
          <div class="ann-filter-field">
            <label class="text-muted" for="ann-search">Search</label>
            <input class="input" id="ann-search" type="search" placeholder="Title, body, author" />
          </div>
          <div class="ann-filter-field">
            <label class="text-muted" for="ann-status">Status</label>
            <select class="select" id="ann-status">
              <option value="">All</option>
              <option value="published">Published</option>
              <option value="draft">Draft</option>
              <option value="archived">Archived</option>
            </select>
          </div>
          <div class="ann-filter-field">
            <label class="text-muted" for="ann-audience">Audience</label>
            <select class="select" id="ann-audience">
              <option value="">All</option>
              <option value="all">All Staff</option>
              <option value="employee">Employees</option>
              <option value="manager">Managers</option>
              <option value="hr_admin">HR Admin</option>
              <option value="super_admin">Super Admin</option>
            </select>
          </div>
        </section>

        <section class="ann-kpis">
          <div class="card ann-kpi">
            <div class="text-muted">Total</div>
            <div class="kpi-value" id="ann-kpi-total">0</div>
          </div>
          <div class="card ann-kpi">
            <div class="text-muted">Published</div>
            <div class="kpi-value" id="ann-kpi-published">0</div>
          </div>
          <div class="card ann-kpi">
            <div class="text-muted">Draft</div>
            <div class="kpi-value" id="ann-kpi-draft">0</div>
          </div>
          <div class="card ann-kpi">
            <div class="text-muted">Pinned</div>
            <div class="kpi-value" id="ann-kpi-pinned">0</div>
          </div>
        </section>

        <section class="ann-grid" id="ann-list"></section>
        <div id="ann-empty" class="empty-state hidden">No announcements found for this filter.</div>
      </main>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="../Page%20Controllers/announcements.page.js"></script>
</body>
</html>
