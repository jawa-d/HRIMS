<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRMS | Secure Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../HRMS%20CSS/tokens.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/global.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/components.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/navbar.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/sidebar.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/modal.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/toast.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/secure-vault.css" />
</head>
<body data-page="secure_vault">
  <div id="app" class="app-shell">
    <div id="sidebar-root"></div>
    <div class="main-content">
      <div id="navbar-root"></div>
      <main class="page">
        <div class="page-header">
          <div>
            <h1 class="page-title" data-i18n="secure_vault.title">Secure Vault</h1>
            <p class="text-muted" data-i18n="secure_vault.subtitle">Store critical account credentials with encryption and a private unlock code.</p>
          </div>
          <button class="btn btn-primary" id="vault-add-btn">
            <i data-lucide="plus"></i>
            Add Credential
          </button>
        </div>

        <section class="card vault-stats">
          <div class="vault-stat">
            <span class="text-muted">Saved Entries</span>
            <strong id="vault-kpi-total">0</strong>
          </div>
          <div class="vault-stat">
            <span class="text-muted">Last Update</span>
            <strong id="vault-kpi-updated">-</strong>
          </div>
        </section>

        <section class="card">
          <div class="vault-toolbar">
            <input class="input" id="vault-search" type="search" placeholder="Search by site, url, username" />
          </div>
          <div class="table-wrap">
            <table class="table vault-table">
              <thead>
                <tr>
                  <th>Site</th>
                  <th>URL</th>
                  <th>Username</th>
                  <th>Password</th>
                  <th>Owner</th>
                  <th>Updated</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="vault-body"></tbody>
            </table>
          </div>
          <div id="vault-empty" class="empty-state hidden">No credentials saved yet.</div>
        </section>
      </main>
    </div>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="../Page%20Controllers/secure-vault.page.js"></script>
</body>
</html>
