<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRMS | Cash In/Out</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../HRMS%20CSS/tokens.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/global.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/components.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/navbar.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/sidebar.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/modal.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/toast.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/accounting-flow.css" />
</head>
<body data-page="accounting_flow">
  <div id="app" class="app-shell">
    <div id="sidebar-root"></div>
    <div class="main-content">
      <div id="navbar-root"></div>
      <main class="page">
        <div class="page-header">
          <div>
            <h1 class="page-title" data-i18n="accounting_flow.title">Cash In/Out</h1>
            <p class="text-muted">Track incoming and outgoing cash records with Firebase sync.</p>
          </div>
          <div class="accflow-head-actions">
            <button class="btn btn-ghost" id="accflow-export-excel-btn">
              <i data-lucide="file-spreadsheet"></i>
              Export Excel
            </button>
            <button class="btn btn-ghost" id="accflow-export-pdf-btn">
              <i data-lucide="file-text"></i>
              Export PDF
            </button>
            <button class="btn btn-primary" id="accflow-add-btn">
              <i data-lucide="plus"></i>
              Add Entry
            </button>
          </div>
        </div>

        <section class="accflow-tools">
          <input class="input" id="accflow-search" type="search" placeholder="Search category, notes, date..." />
          <select class="select" id="accflow-type-filter">
            <option value="">All Types</option>
            <option value="in">In</option>
            <option value="out">Out</option>
          </select>
          <input class="input" id="accflow-month-filter" type="month" />
        </section>

        <section class="accflow-summary grid-3">
          <div class="card summary-card summary-in">
            <div class="text-muted">Total In</div>
            <div class="summary-value" id="accflow-total-in">0</div>
          </div>
          <div class="card summary-card summary-out">
            <div class="text-muted">Total Out</div>
            <div class="summary-value" id="accflow-total-out">0</div>
          </div>
          <div class="card summary-card summary-net">
            <div class="text-muted">Net</div>
            <div class="summary-value" id="accflow-total-net">0</div>
          </div>
        </section>

        <div class="card">
          <div class="table-scroll">
            <table class="table">
              <thead>
                <tr>
                  <th>Journal No</th>
                  <th>Date</th>
                  <th>Type</th>
                  <th>Amount</th>
                  <th>Category</th>
                  <th>Expense Receipt No</th>
                  <th>External Receipt No</th>
                  <th>Notes</th>
                  <th>Attachment</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="accflow-body"></tbody>
            </table>
          </div>
          <div id="accflow-empty" class="empty-state hidden">No cash in/out entries found.</div>
        </div>
      </main>
    </div>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script type="module" src="../Page%20Controllers/accounting-flow.page.js"></script>
</body>
</html>
