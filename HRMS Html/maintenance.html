<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRMS | Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../HRMS%20CSS/tokens.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/global.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/components.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/page-maintenance.css" />
</head>
<body data-page="maintenance">
  <main class="maintenance-shell">
    <div class="maintenance-decor" aria-hidden="true">
      <span class="maintenance-shape shape-a"></span>
      <span class="maintenance-shape shape-b"></span>
      <span class="maintenance-shape shape-c"></span>
      <span class="maintenance-grid"></span>
    </div>
    <section class="card maintenance-card">
      <div class="maintenance-icon">
        <i data-lucide="wrench"></i>
      </div>
      <div class="maintenance-badge">System Update | تحديث النظام</div>
      <h1 class="maintenance-title" data-i18n="maintenance.title">This page is under maintenance</h1>
      <p class="maintenance-desc" data-i18n="maintenance.subtitle">This page is currently paused for update or maintenance.</p>
      <div class="maintenance-meta">
        <strong data-i18n="maintenance.page_label">Page</strong>
        <span id="maintenance-page-name">-</span>
      </div>
      <div class="maintenance-meta hidden" id="maintenance-reason-wrap">
        <strong data-i18n="maintenance.reason_label">Reason</strong>
        <span id="maintenance-reason">-</span>
      </div>
      <div class="maintenance-meta hidden" id="maintenance-eta-wrap">
        <strong data-i18n="maintenance.eta_label">Expected Return</strong>
        <span id="maintenance-eta">-</span>
      </div>
      <p class="text-muted" data-i18n="maintenance.note">Please try again shortly.</p>
      <div class="maintenance-actions">
        <button class="btn btn-ghost" id="maintenance-back-btn" data-i18n="maintenance.back">Go Back</button>
        <a class="btn btn-outline" href="dashboard.html" data-i18n="maintenance.dashboard">Go to Dashboard</a>
      </div>
    </section>
  </main>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="../Page%20Controllers/maintenance.page.js"></script>
</body>
</html>
