<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRMS | Excel Sheet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../HRMS%20CSS/tokens.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/global.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/components.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/navbar.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/sidebar.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/toast.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/excel-sheet.css" />
</head>
<body data-page="excel_sheet">
  <div id="app" class="app-shell">
    <div id="sidebar-root"></div>
    <div class="main-content">
      <div id="navbar-root"></div>
      <main class="page">
        <div class="page-header">
          <div>
            <h1 class="page-title" data-i18n="excel_sheet.title">Excel Sheet</h1>
            <p class="text-muted">Monthly cumulative sheet linked to employee directory.</p>
          </div>
          <div class="excel-actions">
            <button class="btn btn-ghost" id="excel-export-btn">
              <i data-lucide="file-spreadsheet"></i>
              Export CSV
            </button>
            <button class="btn btn-outline" id="excel-reset-btn">
              <i data-lucide="rotate-ccw"></i>
              Reset Inputs
            </button>
          </div>
        </div>

        <section class="excel-kpis">
          <article class="card excel-kpi">
            <p class="text-muted">Employees</p>
            <h3 id="excel-employees-count">0</h3>
          </article>
          <article class="card excel-kpi">
            <p class="text-muted">Grand Total (Dec)</p>
            <h3 id="excel-grand-total">0</h3>
          </article>
        </section>

        <section class="card excel-table-card">
          <div class="excel-table-wrap">
            <table class="excel-table" id="excel-table">
              <thead>
                <tr id="excel-header-row">
                  <th class="sticky-col">Employee Name</th>
                </tr>
              </thead>
              <tbody id="excel-body"></tbody>
            </table>
            <div class="excel-empty hidden" id="excel-empty">
              No employees found. Add employees first from Employees page.
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="../Page%20Controllers/excel-sheet.page.js"></script>
</body>
</html>
