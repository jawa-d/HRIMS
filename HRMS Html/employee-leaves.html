<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRMS | My Leave Requests</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../HRMS%20CSS/tokens.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/global.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/components.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/navbar.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/sidebar.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/toast.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/employee-leaves.css" />
</head>
<body data-page="my_leaves">
  <div id="app" class="app-shell">
    <div id="sidebar-root"></div>
    <div class="main-content">
      <div id="navbar-root"></div>
      <main class="page">
        <div class="page-header">
          <div>
            <h1 class="page-title" data-i18n="my_leaves.title">My Leave Requests</h1>
            <p class="text-muted" data-i18n="my_leaves.subtitle">Submit your leave request and track approval status from your section.</p>
          </div>
        </div>

        <section class="my-leaves-grid">
          <div class="card">
            <div class="card-header">
              <h3 class="section-title">
                <i data-lucide="calendar-plus"></i>
                <span data-i18n="my_leaves.submit_request">Submit Request</span>
              </h3>
            </div>
            <div class="form-grid">
              <label><span data-i18n="my_leaves.field.type">Type</span>
                <select class="select" id="my-leave-type">
                  <option value="Annual" data-i18n="my_leaves.type.annual">Annual</option>
                  <option value="Sick" data-i18n="my_leaves.type.sick">Sick</option>
                  <option value="Emergency" data-i18n="my_leaves.type.emergency">Emergency</option>
                  <option value="Unpaid" data-i18n="my_leaves.type.unpaid">Unpaid</option>
                  <option value="Maternity" data-i18n="my_leaves.type.maternity">Maternity</option>
                </select>
              </label>
              <label><span data-i18n="my_leaves.field.from">From</span><input class="input" id="my-leave-from" type="date" /></label>
              <label><span data-i18n="my_leaves.field.to">To</span><input class="input" id="my-leave-to" type="date" /></label>
              <label><span data-i18n="my_leaves.field.days">Days</span><input class="input" id="my-leave-days" type="number" min="1" value="1" /></label>
              <label><span data-i18n="my_leaves.field.category">Category</span>
                <select class="select" id="my-leave-category">
                  <option value="Personal" data-i18n="my_leaves.category.personal">Personal</option>
                  <option value="Medical" data-i18n="my_leaves.category.medical">Medical</option>
                  <option value="Family" data-i18n="my_leaves.category.family">Family</option>
                  <option value="Travel" data-i18n="my_leaves.category.travel">Travel</option>
                  <option value="Other" data-i18n="my_leaves.category.other">Other</option>
                </select>
              </label>
              <label><span data-i18n="my_leaves.field.reason">Reason</span><textarea class="textarea" id="my-leave-reason" data-i18n-placeholder="my_leaves.reason_placeholder" placeholder="Write your reason"></textarea></label>
            </div>
            <div class="submit-row">
              <button class="btn btn-primary" id="my-leave-submit-btn">
                <i data-lucide="send"></i>
                <span data-i18n="my_leaves.submit_to_department">Submit to Department</span>
              </button>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <h3 class="section-title">
                <i data-lucide="list-checks"></i>
                <span data-i18n="my_leaves.request_status">Request Status</span>
              </h3>
            </div>
            <div class="status-grid">
              <div class="status-tile summary-card">
                <div class="text-muted" data-i18n="my_leaves.status.pending">Pending</div>
                <div class="status-value" id="my-pending-count">0</div>
              </div>
              <div class="status-tile summary-card">
                <div class="text-muted" data-i18n="my_leaves.status.approved">Approved</div>
                <div class="status-value" id="my-approved-count">0</div>
              </div>
              <div class="status-tile summary-card">
                <div class="text-muted" data-i18n="my_leaves.status.rejected">Rejected</div>
                <div class="status-value" id="my-rejected-count">0</div>
              </div>
            </div>
            <div class="decision-box" id="my-last-decision" data-i18n="my_leaves.no_final_decision">No final decision yet.</div>
          </div>
        </section>

        <div class="card">
          <div class="card-header">
            <h3 class="section-title">
              <i data-lucide="calendar-check-2"></i>
              <span data-i18n="my_leaves.history_title">My Requests History</span>
            </h3>
            <div class="filters-row">
              <input class="input" id="my-leave-search" data-i18n-placeholder="my_leaves.search_request" placeholder="Search request" />
              <select class="select" id="my-leave-status-filter">
                <option value="" data-i18n="my_leaves.filter.all_status">All Status</option>
                <option value="pending" data-i18n="my_leaves.status.pending">Pending</option>
                <option value="approved" data-i18n="my_leaves.status.approved">Approved</option>
                <option value="rejected" data-i18n="my_leaves.status.rejected">Rejected</option>
              </select>
            </div>
          </div>
          <div class="table-scroll">
            <table class="table leave-table">
              <thead>
                <tr>
                  <th data-i18n="my_leaves.table.request_id">Request ID</th>
                  <th data-i18n="my_leaves.field.type">Type</th>
                  <th data-i18n="my_leaves.table.dates">Dates</th>
                  <th data-i18n="my_leaves.field.days">Days</th>
                  <th data-i18n="common.status">Status</th>
                  <th data-i18n="common.actions">Actions</th>
                </tr>
              </thead>
              <tbody id="my-leaves-body"></tbody>
            </table>
          </div>
          <div id="my-leaves-empty" class="empty-state hidden" data-i18n="my_leaves.empty">No requests found</div>
        </div>
      </main>
    </div>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="../Page%20Controllers/employee-leaves.page.js"></script>
</body>
</html>
