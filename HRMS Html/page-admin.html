<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRMS | Page Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../HRMS%20CSS/tokens.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/global.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/components.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/navbar.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/sidebar.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/toast.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/page-admin.css" />
</head>
<body data-page="page_admin">
  <div id="app" class="app-shell">
    <div id="sidebar-root"></div>
    <div class="main-content">
      <div id="navbar-root"></div>
      <main class="page">
        <div class="page-header">
          <div>
            <h1 class="page-title" data-i18n="page_admin.title">Page Management</h1>
            <p class="text-muted" data-i18n="page_admin.subtitle">Enable or pause any page with one button.</p>
          </div>
        </div>
        <section class="card page-admin-card">
          <p class="text-muted page-admin-help" data-i18n="page_admin.hint">Use pause/run button for instant control. Click schedule to set timed pause or resume.</p>
          <div class="page-admin-table-wrap">
            <table class="table page-admin-table" id="page-admin-table"></table>
          </div>
        </section>
        <section class="card page-admin-audit-card">
          <div class="card-header">
            <h3 class="section-title">
              <i data-lucide="history"></i>
              <span data-i18n="page_admin.audit_title">Page Control Audit Log</span>
            </h3>
          </div>
          <div class="page-admin-table-wrap">
            <table class="table page-admin-audit-table" id="page-admin-audit-table"></table>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="../Page%20Controllers/page-admin.page.js"></script>
</body>
</html>
