<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRMS | Login Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../HRMS%20CSS/tokens.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/global.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/components.css" />
  <link rel="stylesheet" href="../HRMS%20CSS/toast.css" />
  <style>
    :root {
      --login-bg: #f5f7fb;
      --login-panel: #ffffff;
      --login-border: #e2e8f0;
      --login-ink: #1e2c4f;
      --login-muted: #63718b;
      --login-primary: #1e2f8c;
      --login-primary-strong: #16246f;
      --login-accent: #1cc8aa;
      --login-shadow: 0 24px 42px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body[data-page="login"] {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", "Cairo", sans-serif;
      color: var(--login-ink);
      background:
        radial-gradient(circle at 14% 18%, rgba(30, 47, 140, 0.08), transparent 32%),
        radial-gradient(circle at 84% 78%, rgba(39, 174, 164, 0.08), transparent 30%),
        var(--login-bg);
    }

    .login-page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
    }

    .login-main {
      width: min(1280px, 95vw);
      margin: 24px auto 0;
      display: grid;
      align-items: center;
      padding-bottom: 18px;
    }

    .login-shell {
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 22px;
      box-shadow: var(--login-shadow);
      display: grid;
      grid-template-columns: minmax(320px, 460px) 1fr;
      gap: 34px;
      padding: clamp(18px, 2.4vw, 34px);
    }

    .login-auth-wrap {
      display: grid;
      gap: 14px;
      align-content: center;
    }

    .style-switch {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      border-radius: 999px;
      padding: 4px;
      border: 1px solid var(--login-border);
      background: #f8fafc;
    }

    .style-switch a {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.74rem;
      font-weight: 700;
      color: #64748b;
      text-decoration: none;
    }

    .style-switch a.active {
      background: #e2e8ff;
      color: #21317d;
    }

    .login-card {
      background: var(--login-panel);
      border: 1px solid var(--login-border);
      border-radius: 18px;
      padding: clamp(18px, 2.1vw, 30px);
      box-shadow: 0 14px 24px rgba(15, 23, 42, 0.08);
      display: grid;
      gap: 16px;
    }

    .portal-title {
      margin: 0;
      font-size: clamp(1.6rem, 2.2vw, 2.2rem);
      letter-spacing: 0.03em;
      font-weight: 800;
      color: var(--login-primary);
      text-transform: uppercase;
      border-bottom: 3px solid var(--login-accent);
      padding-bottom: 10px;
    }

    .portal-subtitle {
      margin: 0;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      font-weight: 700;
      color: #334155;
      text-transform: uppercase;
    }

    .auth-form {
      display: grid;
      gap: 10px;
      margin-top: 6px;
    }

    .auth-form .input {
      height: 48px;
      border-radius: 999px;
      border: 1px solid #d0d9e5;
      background: #f9fbff;
      color: #1f2937;
      padding-inline: 16px;
    }

    .auth-form .input:focus {
      border-color: #8ea5f9;
      box-shadow: 0 0 0 3px rgba(78, 107, 230, 0.14);
      background: #ffffff;
    }

    .auth-form .btn-primary {
      height: 48px;
      border-radius: 999px;
      border: 0;
      margin-top: 4px;
      font-weight: 800;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, var(--login-primary), var(--login-primary-strong));
      box-shadow: 0 10px 18px rgba(30, 47, 140, 0.28);
    }

    .auth-form small {
      color: var(--login-muted);
      font-size: 0.82rem;
      text-align: center;
    }

    .auth-data-note {
      margin: 0;
      color: #51607b;
      font-size: 0.8rem;
      line-height: 1.6;
      text-align: center;
    }

    .login-visual {
      border: 1px solid #e8edf5;
      border-radius: 20px;
      background: linear-gradient(180deg, #fbfdff, #f2f6fd);
      display: grid;
      place-items: center;
      padding: clamp(18px, 3vw, 32px);
      min-height: 520px;
    }

    .visual-illustration {
      width: min(100%, 700px);
      height: auto;
      display: block;
    }

    .login-footer {
      background: #1e2f8c;
      color: #e2e8f0;
      text-align: center;
      font-size: 0.78rem;
      padding: 12px 16px;
    }

    @media (max-width: 1024px) {
      .login-shell {
        grid-template-columns: 1fr;
      }

      .login-visual {
        min-height: 320px;
      }
    }

    @media (max-width: 640px) {
      .login-main {
        width: min(100%, 96vw);
        margin-top: 12px;
      }

      .login-shell {
        border-radius: 16px;
        padding: 14px;
        gap: 16px;
      }

      .login-card {
        border-radius: 14px;
      }
    }
  </style>
</head>
<body data-page="login">
  <div class="login-page">
    <main class="login-main">
      <section class="login-shell">
        <section class="login-auth-wrap" aria-label="Authentication">
        <div class="style-switch">
          <a href="login.html?variant=executive" class="active">Executive</a>
          <a href="login.html?variant=creative">Creative</a>
        </div>
          <div class="login-card">
            <h1 class="portal-title">شركة وادي الرافدين نظام الداخلي</h1>
            <p class="portal-subtitle" data-i18n="login.title">Login</p>
            <form id="login-form" class="auth-form">
              <input
                class="input"
                type="email"
                id="login-email"
                required
                autofocus
                placeholder="Email"
              />
              <button class="btn btn-primary" type="submit" data-i18n="login.submit">Sign In</button>
              <small data-i18n="login.helper">Use your company account</small>
            </form>
          </div>
          <p class="auth-data-note" data-i18n="login.data_notice">Data is protected by the IT Department - Wadi Al-Rafidain Company.</p>
        </section>

          </svg>
        </aside>
      </section>
    </main>

    <footer class="login-footer">&copy; 2024-2026 Wadi Al-Rafidain HRMS Team. All rights reserved.</footer>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="../Page%20Controllers/login.page.js"></script>
</body>
</html>
